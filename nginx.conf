# 杜塞道夫光影詩集 — nginx 站台設定
# 由 Dockerfile 複製到 /etc/nginx/conf.d/default.conf
server {
    # Cloud Run 預設將流量送往容器的 8080 埠
    listen       8080;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.htm;

    # 壓縮：對 HTML／XML 等文字內容有效（圖片與影音本身已是壓縮格式）
    gzip              on;
    gzip_min_length   256;
    gzip_types        text/css application/javascript application/json image/svg+xml application/xml;

    # 一般請求：靜態檔案，找不到即回傳 404
    location / {
        try_files $uri $uri/ =404;
    }

    # 圖片／音訊／影片：長時間快取（檔名更動才會失效）
    location ~* \.(jpg|jpeg|png|gif|webp|svg|ico|mp3|mov|mp4|webm)$ {
        expires    30d;
        access_log off;
    }

    # HTML：短時間快取，讓內容更新能較快反映給使用者
    location ~* \.(html?)$ {
        expires 10m;
    }
}
